name: Misskey Bot JS Cron
concurrency:
  group: bot-group
  cancel-in-progress: true

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Force Update)
        # @latest を指定し、package-lockを無視して最新を入れ直します
        run: |
          npm install @google/generative-ai@0.21.0 misskey-js@latest axios

      - name: Run bot
        env:
          MK_DOMAIN: ${{ secrets.MK_DOMAIN }}
          MK_TOKEN: ${{ secrets.MK_TOKEN }}
          MK_TOKEN_ID: ${{ secrets.MK_TOKEN_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_SUB: ${{ secrets.GEMINI_API_KEY_SUB }}
        run: node bot.js
